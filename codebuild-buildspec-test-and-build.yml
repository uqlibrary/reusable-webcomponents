version: 0.2

# Run this on the official Playwright image, set as the CodeBuild PROJECT's
# environment image (Edit project -> Environment -> External registry URL):
#   mcr.microsoft.com/playwright:v1.56.1-noble
# The image ships Chromium + all its system libraries and Node preinstalled, so
# CI does not download browsers, run playwright install-deps, or juggle Node
# versions (n/nvm). Keep the tag in sync with @playwright/test in package.json.

env:
  variables:
    # allow global npm installs while running as root on the Playwright image
    npm_config_unsafe_perm: "true"
  parameter-store:
    PT_PROJECT: "/CodeBuild/reusable-webcomponents/PT_PROJECT"
    PT_TOKEN: "/CodeBuild/reusable-webcomponents/PT_TOKEN"
    CYPRESS_RECORD_KEY: "/CodeBuild/reusable-webcomponents/CYPRESS_RECORD_KEY"
    SENTRY_AUTH_TOKEN: "/CodeBuild/reusable-webcomponents/SENTRY_AUTH_TOKEN"
    SENTRY_ORG: "/CodeBuild/reusable-webcomponents/SENTRY_ORG"
    SENTRY_PROJECT: "/CodeBuild/reusable-webcomponents/SENTRY_PROJECT"
  #secrets-manager:
     # key: secret-id:json-key:version-stage:version-id
     # key: secret-id:json-key:version-stage:version-id
  #exported-variables:
     # - variable
     # - variable
  #git-credential-helper: yes
#batch:
  #fast-fail: true
  #build-list:
  #build-matrix:
  #build-graph:
phases:
  install:
    commands:
      - sysctl fs.inotify.max_user_watches=524288 || true
      - chmod a+x -R bin/*
      - bin/codebuild-setup.sh
  pre_build:
    commands:
      - bin/codebuild-test.sh
  build:
    commands:
      - set
      - export BUILD_TARGET='development'
      - "if [ \"$CI_BRANCH\" = \"production\" -o \"$CI_BRANCH\" = \"staging\" ]; then export BUILD_TARGET=$CI_BRANCH ; fi"
      - npm run build:$BUILD_TARGET
      - ls dist
  post_build:
    commands:
      if [ -f ./scripts/releaseNotes.sh ]; then ./scripts/releaseNotes.sh; fi
#reports:
  #report-name-or-arn:
    #files:
      # - location
      # - location
    #base-directory: location
    #discard-paths: yes
    #file-format: JunitXml | CucumberJson
artifacts:
  files:
    - '**/*'
  name: reusable-webcomponents-build.zip
  base-directory: dist
#cache:
  #paths:
    # - paths
